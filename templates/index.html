<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dementia Analyzer</title>
    <!-- Modern web fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .upload-area {
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
            background-color: #1e293b;
        }

        .upload-area:hover {
            border-color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .upload-icon {
            font-size: 40px;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            animation: fadeIn 0.4s ease-out;
        }

        .result-box img {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .result-title {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-color);
        }

        .error {
            color: var(--danger);
            background-color: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* File name display */
        .file-name {
            display: none;
            color: var(--text-primary);
            font-weight: 500;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dementia Analyzer</h1>
        <p>Upload a patient's clock-drawing test image for automated severity classification.</p>

        {% if error %}
        <div class="error">
            <svg style="width:20px;height:20px;vertical-align:middle;margin-right:8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            <div class="upload-area" id="drop-zone">
                <input type="file" name="file" id="file-upload" accept="image/*" required onchange="showFileName()">
                <div class="upload-icon">
                    <svg style="width:48px;height:48px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                </div>
                <div style="font-weight:600;font-size:18px;">Click to browse</div>
                <div style="color:var(--text-secondary);margin-top:8px;font-size:14px;">or drag and drop image here</div>
                <div class="file-name" id="file-name-display"></div>
            </div>
            
            <button type="submit" class="btn">Analyze Image</button>
        </form>

        {% if prediction %}
        <div class="result-box">
            <img src="{{ image_url }}" alt="Uploaded Clock Test" style="max-height: 250px; object-fit: contain;">
            <div class="result-title">Predicted Severity</div>
            <div class="result-value">{{ prediction }}</div>
        </div>
        {% endif %}
    </div>

    <script>
        function showFileName() {
            const input = document.getElementById('file-upload');
            const display = document.getElementById('file-name-display');
            if (input.files && input.files[0]) {
                display.style.display = 'block';
                display.innerText = 'Selected: ' + input.files[0].name;
                
                // Change border color to show success
                document.getElementById('drop-zone').style.borderColor = 'var(--accent-color)';
            }
        }
    </script>
</body>
</html>
